      #splash-title {
        margin-top: 24px;
        font: 900 36px/1 system-ui, -apple-system, sans-serif;
        letter-spacing: 0.3em;
        background: linear-gradient(to right, #f97316, #dc2626);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        opacity: 0; transform: translateY(12px);
        animation: sTextIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      }
      #splash-bar-track {
        margin-top: 36px; width: 120px; height: 2px;
        border-radius: 1px; background: rgba(255,255,255,0.06);
        overflow: hidden;
      }
      #splash-bar {
        width: 100%; height: 100%; border-radius: 1px;
        background: linear-gradient(to right, #f97316, #dc2626);
        transform-origin: center;
        animation: sBarPulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes sLogoIn {
        to { opacity: 1; transform: scale(1); filter: blur(0); }
      }
      @keyframes sLogoPulse {
        0%, 100% { box-shadow: 0 0 30px rgba(249,115,22,0.25), 0 0 60px rgba(249,115,22,0.08); transform: scale(1); }
        50% { box-shadow: 0 0 50px rgba(249,115,22,0.4), 0 0 100px rgba(249,115,22,0.15); transform: scale(1.05); }
      }
